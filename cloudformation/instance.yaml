AWSTemplateFormatVersion: '2010-09-09'
Description: QBadger EC2 instance stack (replaceable, references secrets stack)

Parameters:
  InstanceType:
    Type: String
    Default: t3.large
    AllowedValues: [t3.medium, t3.large, t3.xlarge, t3.2xlarge]
    Description: EC2 instance type
  VolumeSize:
    Type: Number
    Default: 50
    MinValue: 20
    MaxValue: 500
    Description: EBS volume size in GB
  VolumeType:
    Type: String
    Default: gp3
    AllowedValues: [gp3, gp2]
    Description: EBS volume type
  AlertEmail:
    Type: String
    Description: Email address for CloudWatch alarm notifications

Resources:
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: qbadger-alerts
      Tags:
        - Key: Project
          Value: qbadger

  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  ServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /qbadger/service
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: qbadger

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: QBadger EC2 - egress only, no inbound rules
      Tags:
        - Key: Name
          Value: qbadger-sg
        - Key: Project
          Value: qbadger

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:qbadger/*
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/qbadger/*
      Tags:
        - Key: Project
          Value: qbadger

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  CpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: qbadger-cpu-high
      AlarmDescription: QBadger CPU utilization above 80% for 5 minutes
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: InstanceId
          Value: !Ref Instance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  StatusCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: qbadger-status-check-failed
      AlarmDescription: QBadger EC2 system status check failure with auto-recovery
      Namespace: AWS/EC2
      MetricName: StatusCheckFailed_System
      Dimensions:
        - Name: InstanceId
          Value: !Ref Instance
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
        - !Sub arn:aws:automate:${AWS::Region}:ec2:recover

  MemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: qbadger-memory-high
      AlarmDescription: QBadger memory utilization above 85%
      Namespace: CWAgent
      MetricName: mem_used_percent
      Dimensions:
        - Name: InstanceId
          Value: !Ref Instance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 85
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  DiskAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: qbadger-disk-high
      AlarmDescription: QBadger disk utilization above 80%
      Namespace: CWAgent
      MetricName: disk_used_percent
      Dimensions:
        - Name: InstanceId
          Value: !Ref Instance
        - Name: path
          Value: /
        - Name: fstype
          Value: xfs
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  DockerDaemonAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: qbadger-dockerd-down
      AlarmDescription: Docker daemon process not running
      Namespace: CWAgent
      MetricName: procstat_lookup_pid_count
      Dimensions:
        - Name: InstanceId
          Value: !Ref Instance
        - Name: exe
          Value: dockerd
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
