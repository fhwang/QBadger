AWSTemplateFormatVersion: '2010-09-09'
Description: QBadger EC2 instance stack (replaceable, references secrets stack)

Parameters:
  InstanceType:
    Type: String
    Default: t3.large
    AllowedValues: [t3.medium, t3.large, t3.xlarge, t3.2xlarge]
    Description: EC2 instance type
  VolumeSize:
    Type: Number
    Default: 50
    MinValue: 20
    MaxValue: 500
    Description: EBS volume size in GB
  VolumeType:
    Type: String
    Default: gp3
    AllowedValues: [gp3, gp2]
    Description: EBS volume type
  AlertEmail:
    Type: String
    Description: Email address for CloudWatch alarm notifications

Resources:
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: qbadger-alerts
      Tags:
        - Key: Project
          Value: qbadger

  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  ServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /qbadger/service
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: qbadger

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: QBadger EC2 - egress only, no inbound rules
      Tags:
        - Key: Name
          Value: qbadger-sg
        - Key: Project
          Value: qbadger

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:qbadger/*
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/qbadger/*
      Tags:
        - Key: Project
          Value: qbadger

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole
