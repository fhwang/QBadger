AWSTemplateFormatVersion: '2010-09-09'
Description: QBadger secrets (deploy once, persists across EC2 rebuilds)

Parameters:
  CloudflareTunnelToken:
    Type: String
    NoEcho: true
    Description: Cloudflare Tunnel token for webhook ingress
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key for Claude Code sessions
  GitHubBotToken:
    Type: String
    NoEcho: true
    Description: GitHub personal access token for the bot user
  GitHubWebhookSecret:
    Type: String
    NoEcho: true
    Description: GitHub webhook HMAC secret

Resources:
  CloudflareTunnelTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: qbadger/cloudflare-tunnel-token
      Description: Cloudflare Tunnel token for QBadger webhook ingress
      SecretString: !Ref CloudflareTunnelToken
      Tags:
        - Key: Project
          Value: qbadger

  AnthropicApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: qbadger/anthropic-api-key
      Description: Anthropic API key for Claude Code sessions
      SecretString: !Ref AnthropicApiKey
      Tags:
        - Key: Project
          Value: qbadger

  GitHubBotTokenSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: qbadger/github-bot-token
      Description: GitHub personal access token for QBadger bot
      SecretString: !Ref GitHubBotToken
      Tags:
        - Key: Project
          Value: qbadger

  GitHubWebhookSecretSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: qbadger/github-webhook-secret
      Description: GitHub webhook HMAC verification secret
      SecretString: !Ref GitHubWebhookSecret
      Tags:
        - Key: Project
          Value: qbadger

Outputs:
  CloudflareTunnelTokenArn:
    Value: !Ref CloudflareTunnelTokenSecret
    Export:
      Name: qbadger-cloudflare-tunnel-token-secret-arn
  AnthropicApiKeyArn:
    Value: !Ref AnthropicApiKeySecret
    Export:
      Name: qbadger-anthropic-api-key-secret-arn
  GitHubBotTokenArn:
    Value: !Ref GitHubBotTokenSecret
    Export:
      Name: qbadger-github-bot-token-secret-arn
  GitHubWebhookSecretArn:
    Value: !Ref GitHubWebhookSecretSecret
    Export:
      Name: qbadger-github-webhook-secret-secret-arn
